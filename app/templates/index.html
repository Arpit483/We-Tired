<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VitalRadar — Live Detection Dashboard</title>

  <style>
    :root{
      --bg:#ffffff;
      --text:#0b1220;
      --panel-bg:#fafafa;
      --panel-border:rgba(16,24,32,0.06);
      --accent:#16a34a;
      --accent-dark:#0f7a34;
      --danger:#dc2626;
      --muted:#6b7280;
      --radius:12px;
      --shadow:rgba(11,18,32,0.08);
      --focus: 3px solid rgba(22,163,74,0.18);
    }
    .dark-theme{
      --bg:#0b1220; --text:#e6eef6; --panel-bg:#0f1724; --panel-border: rgba(255,255,255,0.04);
      --accent:#22c55e; --muted:#9aa6b2; --card-bg: rgba(15,23,36,0.7); --danger:#ff6b6b;
    }

    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:var(--bg);color:var(--text);}
    .navbar{padding:16px 24px;background:var(--panel-bg);border-bottom:1px solid var(--panel-border);display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:22px;font-weight:800;color:var(--accent)}
    .container{max-width:1200px;margin:20px auto;padding:0 16px}

    /* detection card */
    .detect-card{background:var(--panel-bg);padding:22px;border-radius:var(--radius);border:1px solid var(--panel-border);box-shadow:0 10px 24px var(--shadow);margin-bottom:18px;display:flex;flex-direction:column;gap:12px}
    .detect-title{font-size:20px;font-weight:900;color:var(--accent)}
    .status-row{display:flex;align-items:center;gap:18px;justify-content:space-between}
    .status-left{display:flex;gap:18px;align-items:center}
    .status-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;box-shadow:0 8px 24px rgba(0,0,0,0.08);font-size:16px}
    .status-text{font-size:24px;font-weight:900}
    .detection-line{margin-top:4px;font-size:16px;font-weight:700}

    .mini-grid{display:flex;gap:12px;align-items:center}
    .mini{display:flex;flex-direction:column;gap:4px}
    .m-label{color:var(--muted);font-weight:700;font-size:13px}
    .m-value{font-weight:900;font-size:18px}

    /* summary card */
    .summary{display:flex;gap:12px;align-items:center;padding:14px;border-radius:12px;border:1px solid var(--panel-border);background:var(--panel-bg);box-shadow:0 8px 16px var(--shadow)}
    .summary .kv{font-weight:700}

    /* panels */
    .row{display:grid;grid-template-columns:1fr 360px;gap:18px}
    @media(max-width:900px){.row{grid-template-columns:1fr}}
    .panel{background:var(--panel-bg);padding:16px;border-radius:var(--radius);border:1px solid var(--panel-border);box-shadow:0 10px 24px var(--shadow)}
    .section-title{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:8px}
    .log-list{max-height:520px;overflow:auto}
    .log-item{padding:12px;border-radius:8px;background:#f3f4f6;margin-bottom:10px;font-weight:700;display:flex;justify-content:space-between;gap:8px}
    .meta{color:var(--muted);font-size:13px;font-weight:600}

    /* floating warning */
    .warning-float{
      position:fixed;right:18px;bottom:18px;z-index:1200;
      background:linear-gradient(180deg,var(--accent),var(--accent-dark));
      color:white;padding:14px 16px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.25);display:none;align-items:center;gap:12px;
    }
    .warning-float .count{font-weight:900;font-size:20px}
    .warn-btn{background:rgba(255,255,255,0.15);border:0;padding:8px 10px;border-radius:8px;color:white;font-weight:800;cursor:pointer}

    /* fullscreen overlay */
    .overlay{
      position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1300;visibility:hidden;opacity:0;transition:opacity .18s,visibility .18s;
      color:white;flex-direction:column;gap:16px;text-align:center;padding:24px;
    }
    .overlay.show{visibility:visible;opacity:1}
    .overlay h1{font-size:64px;margin:0;letter-spacing:2px}
    .overlay p{font-size:22px;margin:0}

    /* controls */
    .controls{display:flex;gap:8px}
    .theme-btn,.btn{padding:8px 12px;border-radius:8px;border:1px solid var(--panel-border);background:transparent;cursor:pointer;font-weight:800}
    .theme-btn:focus,.btn:focus{outline:var(--focus);outline-offset:3px}

    /* small */
    @media(max-width:480px){ .status-circle{width:48px;height:48px} .overlay h1{font-size:40px} .overlay p{font-size:18px} }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">VITALRADAR</div>
    <div class="controls">
      <button id="themeBtn" class="theme-btn" aria-pressed="false">Dark Mode</button>
      <button id="muteBtn" class="theme-btn" aria-pressed="false">Mute</button>
      <button id="refreshBtn" class="theme-btn">Refresh</button>
      <button id="exportBtn" class="theme-btn">Export CSV</button>
    </div>
  </header>

  <main class="container" role="main">
    <div class="detect-card" role="region" aria-label="Live detection">
      <div class="detect-title">Live Detection</div>

      <div class="status-row">
        <div class="status-left">
          <div id="statusCircle" class="status-circle" style="background:#cccccc">—</div>
          <div>
            <div id="statusText" class="status-text">No Data</div>
            <div id="detectionLine" class="detection-line">Detection Status: —</div>
          </div>
        </div>

        <div class="mini-grid">
          <div class="mini" aria-label="Breathing">
            <div class="m-label">Breathing</div>
            <div id="breathingVal" class="m-value">—</div>
          </div>
          <div class="mini" aria-label="Distance">
            <div class="m-label">Distance</div>
            <div id="distanceVal" class="m-value">—</div>
          </div>
          <div class="mini" aria-label="Votes">
            <div class="m-label">Votes</div>
            <div id="votesVal" class="m-value">—</div>
          </div>
          <div class="mini" aria-label="Detected count">
            <div class="m-label">Detected Count</div>
            <div id="detectedCount" class="m-value">0</div>
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
        <div class="summary">
          <div style="display:flex;flex-direction:column">
            <div class="kv">Total Detections</div>
            <div id="totalDet" class="kv" style="font-size:18px;font-weight:900">0</div>
          </div>
          <div style="width:16px"></div>
          <div style="display:flex;flex-direction:column">
            <div class="kv">Breathing Count</div>
            <div id="breathingCount" class="kv" style="font-size:18px;font-weight:900">0</div>
          </div>
          <div style="width:16px"></div>
          <div style="display:flex;flex-direction:column">
            <div class="kv">Avg Votes</div>
            <div id="avgVotes" class="kv" style="font-size:18px;font-weight:900">0</div>
          </div>
        </div>

        <div style="display:flex;gap:8px;align-items:center">
          <button id="ackBtn" class="btn" title="Acknowledge current alert">Acknowledge</button>
          <div class="kv" id="lastUpdated">Last: —</div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="panel" aria-label="Detections Log">
        <div class="section-title">Detections Log</div>
        <div id="detectList" class="log-list" role="log" aria-live="polite"></div>
      </div>

      <div class="panel" aria-label="Event Timeline">
        <div class="section-title">Event Timeline</div>
        <div id="timeline" class="log-list" role="log" aria-live="polite"></div>
      </div>
    </div>
  </main>

  <!-- floating warning -->
  <div id="warningFloat" class="warning-float" role="alert" aria-live="assertive">
    <div style="display:flex;flex-direction:column">
      <div style="font-size:13px;opacity:0.95">ALERT</div>
      <div style="font-size:18px;font-weight:900" id="warningSummary">Person detected</div>
      <div style="font-size:13px;opacity:0.95" id="warningReason">Reason: —</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end">
      <div class="count" id="warningCount" style="font-size:20px">0</div>
      <button id="warningAck" class="warn-btn">Acknowledge</button>
    </div>
  </div>

  <!-- fullscreen overlay -->
  <div id="overlay" class="overlay" role="dialog" aria-live="assertive" aria-modal="true">
    <h1 id="overlayTitle">PERSON DETECTED</h1>
    <p id="overlayReason">Reason: —</p>
    <div style="display:flex;gap:12px">
      <button id="overlayDismiss" class="btn">Dismiss</button>
      <button id="overlayAcknowledge" class="btn">Acknowledge</button>
    </div>
  </div>

  <script>
    /****************************************************************
     * Detection logic & UI with:
     * A - audio alert
     * B - floating warning box
     * C - fullscreen overlay when alerting
     * D - multiple-person support (count unique IDs)
     * E - detection reason reporting
     ****************************************************************/

    // Controls
    const themeBtn = document.getElementById('themeBtn');
    const muteBtn = document.getElementById('muteBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const exportBtn = document.getElementById('exportBtn');
    const ackBtn = document.getElementById('ackBtn');
    const warningAckBtn = document.getElementById('warningAck');
    const overlayDismiss = document.getElementById('overlayDismiss');
    const overlayAck = document.getElementById('overlayAcknowledge');

    // UI nodes
    const statusCircle = document.getElementById('statusCircle');
    const statusText = document.getElementById('statusText');
    const detectionLine = document.getElementById('detectionLine');
    const breathingVal = document.getElementById('breathingVal');
    const distanceVal = document.getElementById('distanceVal');
    const votesVal = document.getElementById('votesVal');
    const detectedCountEl = document.getElementById('detectedCount');
    const totalDetEl = document.getElementById('totalDet');
    const breathingCountEl = document.getElementById('breathingCount');
    const avgVotesEl = document.getElementById('avgVotes');
    const lastUpdatedEl = document.getElementById('lastUpdated');
    const detectList = document.getElementById('detectList');
    const timeline = document.getElementById('timeline');

    const warningFloat = document.getElementById('warningFloat');
    const warningSummary = document.getElementById('warningSummary');
    const warningReason = document.getElementById('warningReason');
    const warningCount = document.getElementById('warningCount');

    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayReason = document.getElementById('overlayReason');

    // state
    let muted = false;
    let dark = false;
    let unacknowledged = false;
    const DETECTION_WINDOW = 12000;
    let seenDetections = new Map();

    // theme
    themeBtn.addEventListener('click', ()=>{
      dark = !dark;
      document.body.classList.toggle('dark-theme', dark);
      themeBtn.textContent = dark ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('vitalradar_theme_dark', dark ? '1' : '0');
    });
    if(localStorage.getItem('vitalradar_theme_dark') === '1'){ 
      dark = true; 
      document.body.classList.add('dark-theme'); 
      themeBtn.textContent = 'Light Mode'; 
    }

    // mute
    muteBtn.addEventListener('click', ()=>{
      muted = !muted;
      muteBtn.setAttribute('aria-pressed', muted);
      muteBtn.textContent = muted ? 'Unmute' : 'Mute';
    });

    refreshBtn.addEventListener('click', fetchLatest);
    ackBtn.addEventListener('click', ()=>{ acknowledgeAlerts(); });
    warningAckBtn.addEventListener('click', ()=>{ acknowledgeAlerts(); });
    overlayDismiss.addEventListener('click', ()=>{ hideOverlay(); });
    overlayAck.addEventListener('click', ()=>{ acknowledgeAlerts(); hideOverlay(); });

    // audio (WebAudio)
    let audioCtx = null;
    function playBeep(type='short'){
      if(muted) return;
      try{
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        if(type==='short'){ 
          o.type='sine'; 
          o.frequency.value = 880; 
          g.gain.setValueAtTime(0, audioCtx.currentTime); 
          g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01); 
          o.start(); 
          o.stop(audioCtx.currentTime + 0.45); 
        } else { 
          o.type='sawtooth'; 
          o.frequency.value = 440; 
          g.gain.setValueAtTime(0, audioCtx.currentTime); 
          g.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.02); 
          o.start(); 
          o.stop(audioCtx.currentTime + 0.9); 
        }
      }catch(e){ console.warn('Audio error', e); }
    }

    // helper: determine detection and reason(s) - MATCHES deep.py EXACTLY
    function analyzeRecord(r){
      const breathing = !!r.breathing;
      const votes = Number(r.votes ?? 0);
      const distance = Number(r.distance ?? Infinity);

      const reasons = [];
      if (breathing) reasons.push('breathing');

      return {
        detected: breathing,                 // detection only from breathing
        reasons: reasons.length ? reasons : ['breathing'],
        primary: reasons.length ? reasons[0] : 'breathing',
        breathing, votes, distance
      };
    }

    // helper to get unique id for a record
    function recordId(r){
      if(r.id !== undefined && r.id !== null) return String(r.id);
      if(r.timestamp) return String(r.timestamp);
      if(r.time) return String(r.time);
      return `${r.distance||0}_${r.votes||0}_${r.breathing?1:0}_${r.timestamp||Date.now()}`;
    }

    // SINGLE processData - CLEAN VERSION (matches deep.py terminal exactly)
    function processData(api){
      const records = Array.isArray(api) ? api : (Array.isArray(api.records) ? api.records : (api.data || []));
      if(!Array.isArray(records)) return;

      // Summary stats
      const total = api.total_detections ?? api.total ?? records.length;
      const breathingCount = api.breathing_count ?? records.filter(r=>r.breathing).length;
      const avgVotes = api.avg_votes ?? (records.length ? Math.round(records.reduce((s,r)=>s+(Number(r.votes)||0),0)/records.length) : 0);

      totalDetEl.textContent = total;
      breathingCountEl.textContent = breathingCount;
      avgVotesEl.textContent = avgVotes;
      lastUpdatedEl.textContent = new Date().toLocaleTimeString();

      // EXACTLY like deep.py: use LATEST record only
      const latest = records.length ? records[records.length - 1] : null;
      const info = latest ? analyzeRecord(latest) : { detected: false, breathing: false };

      // Update card with latest ONLY (same as terminal)
      updateDetectionCard(latest, [info]);

      // Update values - SHOWS VOTES EXACTLY
      breathingVal.textContent = info.breathing ? 'Yes' : 'No';
      distanceVal.textContent = latest?.distance ? `${latest.distance.toFixed(1)}cm` : '—';
      votesVal.textContent = latest?.votes ?? '—';  // ← EXACT deep.py votes
      detectedCountEl.textContent = info.detected ? 1 : 0;

      updateLogsAndTimeline(records.slice(-20)); // last 20 for logs

      // Alerts: only if latest record is breathing (same as deep.py)
      if(info.detected && info.breathing){
        if(!unacknowledged){
          unacknowledged = true;
          showWarning(1, [{record: latest, info}]);
          showOverlay([{record: latest, info}]);
        }
      } else {
        hideWarning();
        hideOverlay();
        unacknowledged = false;
      }
    }

    // update detection badge / card
    function updateDetectionCard(latest, detectedEntries){
      if(!latest){
        statusText.textContent = 'No Data';
        statusText.style.color = 'var(--muted)';
        detectionLine.textContent = 'Detection Status: —';
        detectionLine.style.color = 'var(--muted)';
        statusCircle.style.background = '#cccccc';
        statusCircle.textContent = '—';
        return;
      }

      const info = analyzeRecord(latest);

      if(info.detected){
        statusText.textContent = 'PERSON DETECTED';
        statusText.style.color = 'var(--accent)';
        detectionLine.textContent = `Detection Status: DETECTED (${info.primary})`;
        detectionLine.style.color = 'var(--accent)';
        statusCircle.style.background = 'var(--accent)';
        statusCircle.textContent = 'OK';
      } else {
        statusText.textContent = 'NO PERSON';
        statusText.style.color = 'var(--danger)';
        detectionLine.textContent = 'Detection Status: NOT DETECTED';
        detectionLine.style.color = 'var(--danger)';
        statusCircle.style.background = 'rgba(0,0,0,0.12)';
        statusCircle.textContent = '—';
      }
    }

    // logs & timeline - SHOWS VOTES IN EVERY ENTRY
    function updateLogsAndTimeline(recent){
      detectList.innerHTML = '';
      timeline.innerHTML = '';

      // reverse chronological for detectList
      recent.slice().reverse().forEach(r=>{
        const info = analyzeRecord(r);
        const div = document.createElement('div');
        div.className = 'log-item';
        const left = document.createElement('div');
        left.innerHTML = `<div style="font-weight:900">${r.timestamp ?? r.time ?? (new Date()).toISOString()}</div>
                          <div class="meta">dist: ${r.distance ?? '—'} cm • votes: ${r.votes ?? '—'}</div>
                          <div class="meta">reason: ${info.reasons.join(', ') || 'none'}</div>`;
        const right = document.createElement('div');
        right.style.fontWeight='900';
        right.style.color = info.detected ? 'var(--accent)' : 'var(--danger)';
        right.textContent = info.detected ? 'DETECTED' : '—';
        div.appendChild(left);
        div.appendChild(right);
        detectList.appendChild(div);
      });

      // timeline: last 20 chronological
      recent.slice(-20).forEach(r=>{
        const info = analyzeRecord(r);
        const e = document.createElement('div');
        e.className = 'log-item';
        e.textContent = `${r.timestamp ?? r.time ?? (new Date()).toISOString()} — ${info.detected ? 'PERSON' : 'NONE'} — ${info.reasons.join('|') || 'none'}`;
        timeline.appendChild(e);
      });
    }

    // WARNING / OVERLAY behavior
    function showWarning(count, entries){
      warningSummary.textContent = `${count} detected`;
      const reasonCounts = {};
      for(const en of entries){
        const p = en.info.primary;
        reasonCounts[p] = (reasonCounts[p] || 0) + 1;
      }
      const sorted = Object.keys(reasonCounts).sort((a,b)=> reasonCounts[b]-reasonCounts[a]);
      const top = sorted.length ? sorted[0] : 'breathing';
      warningReason.textContent = `Reason: ${top}`;
      warningCount.textContent = count;
      warningFloat.style.display = 'flex';
      playBeep('short');
      warningFloat.setAttribute('aria-hidden','false');
    }

    function hideWarning(){
      warningFloat.style.display = 'none';
      warningFloat.setAttribute('aria-hidden','true');
    }

    function showOverlay(entries){
      const reasonCounts = {};
      for(const en of entries){
        const p = en.info.primary;
        reasonCounts[p] = (reasonCounts[p] || 0) + 1;
      }
      const sorted = Object.keys(reasonCounts).sort((a,b)=> reasonCounts[b]-reasonCounts[a]);
      const top = sorted.length ? sorted[0] : 'breathing';
      overlayTitle.textContent = 'PERSON DETECTED';
      overlayReason.textContent = `Reason: ${top}`;
      overlay.classList.add('show');
      announceScreen(`Person detected. Reason: ${top}`);
      playBeep('long');
    }

    function hideOverlay(){
      overlay.classList.remove('show');
      announceScreen('Alert dismissed');
    }

    function acknowledgeAlerts(){
      unacknowledged = false;
      seenDetections.clear();
      hideWarning();
      hideOverlay();
    }

    // ARIA announce helper
    function announceScreen(text){
      let sr = document.getElementById('sr-live');
      if(!sr){
        sr = document.createElement('div');
        sr.id = 'sr-live';
        sr.setAttribute('aria-live','polite');
        sr.style.position = 'absolute'; sr.style.left = '-10000px';
        document.body.appendChild(sr);
      }
      sr.textContent = text;
    }

    // Fetch loop
    async function fetchLatest(){
      try{
        const res = await fetch('/api/latest');
        const data = await res.json();
        if(Array.isArray(data)){
          processData({ records: data, total: data.length });
        } else {
          processData(data);
        }
      }catch(e){
        console.error('Fetch error', e);
      }
    }

    // Export CSV
    exportBtn.addEventListener('click', ()=>{
      const rows = [];
      const items = document.querySelectorAll('#detectList .log-item');
      items.forEach(it=>{
        rows.push([ it.innerText.replace(/\n/g,' | ') ]);
      });
      if(rows.length === 0){ alert('No data'); return; }
      const csv = rows.map(r=> r.map(c => `"${c.replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type:'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `vitalradar_${Date.now()}.csv`; document.body.appendChild(a); a.click(); a.remove();
    });

    // initial fetch + interval
    setInterval(fetchLatest, 2000);
    fetchLatest();
  </script>
</body>
</html>
